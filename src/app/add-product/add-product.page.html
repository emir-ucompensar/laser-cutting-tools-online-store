<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Nuevo producto</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="add-product">

    <!-- Zona de foto -->
    <div class="photo-area" (click)="takePhoto()">
      <img *ngIf="previewUrl" [src]="previewUrl" class="photo-area__preview" alt="Vista previa" />
      <div *ngIf="!previewUrl" class="photo-area__placeholder">
        <ion-icon name="camera-outline"></ion-icon>
        <span>Toca para añadir foto</span>
      </div>
    </div>

    <!-- Formulario -->
    <form [formGroup]="form" (ngSubmit)="save()" class="add-product__form">

      <ion-input
        fill="outline"
        label="Nombre del producto"
        labelPlacement="floating"
        formControlName="name"
        type="text"
        autocomplete="off"
      ></ion-input>
      <p class="field-error" *ngIf="form.get('name')?.invalid && form.get('name')?.touched">
        Mínimo 3 caracteres
      </p>

      <ion-select
        fill="outline"
        label="Tipo de producto"
        labelPlacement="floating"
        formControlName="type"
        placeholder="Selecciona un tipo"
      >
        <ion-select-option *ngFor="let t of productTypes" [value]="t">{{ t }}</ion-select-option>
      </ion-select>
      <p class="field-error" *ngIf="form.get('type')?.invalid && form.get('type')?.touched">
        Selecciona un tipo
      </p>

      <ion-input
        fill="outline"
        label="Precio (COP)"
        labelPlacement="floating"
        formControlName="price"
        type="number"
        min="0"
      ></ion-input>
      <p class="field-error" *ngIf="form.get('price')?.invalid && form.get('price')?.touched">
        Ingresa un precio válido
      </p>

      <ion-button
        expand="block"
        type="submit"
        [disabled]="!canSave"
        class="submit-btn"
      >
        Guardar producto
      </ion-button>

    </form>
  </div>
</ion-content>
