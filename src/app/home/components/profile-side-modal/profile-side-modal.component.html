<ion-modal
  [isOpen]="isOpen"
  (didDismiss)="closeModal.emit()"
  cssClass="profile-side-modal"
  [backdropDismiss]="true"
  [enterAnimation]="enterAnimation"
  [leaveAnimation]="leaveAnimation"
>
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>Mi perfil</ion-title>
        <ion-buttons slot="end">
          <ion-button fill="clear" class="profile-close-btn" (click)="onCloseClick($event)">
            <ion-icon name="close-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="profile-sheet">
      <div class="profile-sheet__section">
        <span class="profile-sheet__label">Correo</span>
        <p class="profile-sheet__email">{{ userEmail }}</p>
      </div>

      <button class="profile-sheet__danger" (click)="deleteAccount.emit()">
        Eliminar cuenta
      </button>
    </ion-content>
  </ng-template>
</ion-modal>
