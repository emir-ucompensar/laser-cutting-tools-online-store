<div class="product-item">
  <div class="product-item__image">
    <img [src]="product.image_url" [alt]="product.name" />
  </div>
  <div class="product-item__info">
    <span class="product-item__type">{{ product.type }}</span>
    <h3 class="product-item__name">{{ product.name }}</h3>
    <span class="product-item__price">{{ product.price | currency:'COP':'symbol-narrow':'1.0-0' }}</span>

    <div class="product-item__actions">
      <button class="product-item__action product-item__action--cart" (click)="addToCart.emit(product)">
        Añadir al carrito
      </button>
      <button class="product-item__action product-item__action--delete" (click)="deleteProduct.emit(product)">
        Eliminar producto
      </button>
    </div>
  </div>
</div>
