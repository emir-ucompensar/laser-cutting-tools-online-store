<app-home-web-navbar
  *ngIf="isWeb"
  (openCart)="openCart()"
  (addProduct)="goToAddProduct()"
  (refreshList)="onHardReload()"
  (logout)="logout()"
  (openProfile)="openProfile()"
></app-home-web-navbar>

<!-- ============================================================
  HEADER MOBILE — solo visible en Capacitor / Android
============================================================ -->
<ion-header *ngIf="!isWeb">
  <ion-toolbar>
    <div class="mobile-brand" slot="start">
      <img src="assets/images/logo.png" alt="Logo" />
      <span>Laser Cutting Tools</span>
    </div>
    <ion-buttons slot="end">
      <ion-button class="mobile-refresh-btn" fill="clear" (click)="onHardReload()" aria-label="Actualizar productos">
        <ion-icon name="refresh-outline" slot="start"></ion-icon>
        Actualizar
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<!-- ============================================================
  CONTENIDO PRINCIPAL
============================================================ -->
<ion-content [fullscreen]="true">

  <ion-spinner *ngIf="loading" name="crescent" class="center-spinner" />

  <!-- Lista de productos -->
  <div *ngIf="!loading && products.length > 0" class="product-list">
    <app-product-card
      *ngFor="let p of products"
      [product]="p"
      (addToCart)="onAddToCartClick($event)"
      (deleteProduct)="confirmDelete($event)"
    ></app-product-card>
  </div>

  <!-- Estado vacío -->
  <div *ngIf="!loading && products.length === 0" class="empty-state">
    <ion-icon name="cube-outline" />
    <p>Aún no hay productos.<br />¡Añade el primero!</p>
  </div>

</ion-content>

<!-- ============================================================
  BARRA DE NAVEGACIÓN INFERIOR — solo en Android / Capacitor
============================================================ -->
<app-home-mobile-footer
  *ngIf="!isWeb"
  (openCart)="openCart()"
  (openProfile)="openProfile()"
  (addProduct)="goToAddProduct()"
  (logout)="logout()"
></app-home-mobile-footer>

<!-- ============================================================
  MODAL LATERAL DE PERFIL
============================================================ -->
<app-profile-side-modal
  [isOpen]="profileOpen"
  [userEmail]="userEmail"
  (closeModal)="closeProfile()"
  (deleteAccount)="onDeleteAccountClick()"
></app-profile-side-modal>

<app-cart-side-modal
  [isOpen]="cartOpen"
  [items]="cartItems"
  [total]="cartTotal"
  [loading]="cartLoading"
  (closeModal)="closeCart()"
  (increase)="increaseItem($event)"
  (decrease)="decreaseItem($event)"
  (checkout)="finalizeCheckout()"
></app-cart-side-modal>
