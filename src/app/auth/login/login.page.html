<ion-content class="auth-content">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <img src="assets/images/logo.png" alt="Logo" />
    </div>

    <h1 class="auth-title">Iniciar sesión</h1>
    <p class="auth-subtitle">Bienvenido de vuelta</p>

    <form [formGroup]="form" (ngSubmit)="onLogin()" class="auth-form">

      <ion-input
        fill="outline"
        label="Email"
        label-placement="floating"
        type="email"
        formControlName="email"
        autocomplete="email"
        class="auth-input"
      />
      <p class="field-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
        Introduce un email válido
      </p>

      <ion-input
        fill="outline"
        label="Contraseña"
        label-placement="floating"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        class="auth-input"
      />

      <ion-button expand="block" type="submit" [disabled]="form.invalid || loading" class="auth-btn">
        <ion-spinner *ngIf="loading" name="crescent" />
        <span *ngIf="!loading">Iniciar sesión</span>
      </ion-button>

    </form>

    <ion-button fill="clear" expand="block" (click)="goToRegister()" class="auth-link">
      ¿No tienes cuenta? <strong>&nbsp;Regístrate</strong>
    </ion-button>

  </div>
</ion-content>
