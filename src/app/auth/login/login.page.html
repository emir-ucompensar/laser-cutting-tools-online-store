<ion-header>
  <ion-toolbar>
    <ion-title>Iniciar sesión</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <form [formGroup]="form" (ngSubmit)="onLogin()">

    <!-- Email -->
    <ion-item>
      <ion-label position="floating">Email</ion-label>
      <ion-input type="email" formControlName="email" autocomplete="email" />
    </ion-item>
    <ion-note color="danger" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
      Introduce un email válido
    </ion-note>

    <!-- Contraseña -->
    <ion-item>
      <ion-label position="floating">Contraseña</ion-label>
      <ion-input type="password" formControlName="password" autocomplete="current-password" />
    </ion-item>

    <!-- Error de credenciales -->
    <ion-text color="danger" *ngIf="errorMessage" class="error-msg">
      <p>{{ errorMessage }}</p>
    </ion-text>

    <!-- Botón -->
    <ion-button expand="block" type="submit" [disabled]="form.invalid || loading" class="ion-margin-top">
      <ion-spinner *ngIf="loading" name="crescent" />
      <span *ngIf="!loading">Iniciar sesión</span>
    </ion-button>

  </form>

  <!-- Ir al registro -->
  <ion-button fill="clear" expand="block" (click)="goToRegister()">
    ¿No tienes cuenta? Regístrate
  </ion-button>

</ion-content>
