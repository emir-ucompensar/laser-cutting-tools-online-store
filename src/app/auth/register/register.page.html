<ion-content class="auth-content">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <img src="assets/images/logo.png" alt="Logo" />
    </div>

    <h1 class="auth-title">Crear cuenta</h1>
    <p class="auth-subtitle">Empieza a vender hoy</p>

    <form [formGroup]="form" (ngSubmit)="onRegister()" class="auth-form">

      <ion-input
        fill="outline"
        label="Email"
        label-placement="floating"
        type="email"
        formControlName="email"
        autocomplete="email"
        class="auth-input"
      />
      <p class="field-error" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
        Introduce un email válido
      </p>

      <ion-input
        fill="outline"
        label="Contraseña"
        label-placement="floating"
        type="password"
        formControlName="password"
        autocomplete="new-password"
        class="auth-input"
      />
      <p class="field-error" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
        Mínimo 8 caracteres
      </p>

      <ion-input
        fill="outline"
        label="Confirmar contraseña"
        label-placement="floating"
        type="password"
        formControlName="confirmPassword"
        autocomplete="new-password"
        class="auth-input"
      />
      <p class="field-error" *ngIf="form.errors?.['passwordsMismatch'] && form.get('confirmPassword')?.touched">
        Las contraseñas no coinciden
      </p>

      <ion-button expand="block" type="submit" [disabled]="form.invalid || loading" class="auth-btn">
        <ion-spinner *ngIf="loading" name="crescent" />
        <span *ngIf="!loading">Registrarse</span>
      </ion-button>

    </form>

    <ion-button fill="clear" expand="block" (click)="goToLogin()" class="auth-link">
      ¿Ya tienes cuenta? <strong>&nbsp;Inicia sesión</strong>
    </ion-button>

  </div>
</ion-content>
