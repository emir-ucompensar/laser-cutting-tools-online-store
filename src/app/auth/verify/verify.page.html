<ion-content class="auth-content">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <img src="assets/images/logo.png" alt="Logo" />
    </div>

    <h1 class="auth-title">Verifica tu email</h1>
    <p class="auth-subtitle">
      Ingresa el código de 8 dígitos enviado a<br />
      <strong class="email-highlight">{{ email }}</strong>
    </p>

    <form [formGroup]="form" (ngSubmit)="onVerify()" class="auth-form">

      <ion-input
        fill="outline"
        label="Código de verificación"
        label-placement="floating"
        type="text"
        formControlName="token"
        inputmode="numeric"
        maxlength="8"
        autocomplete="one-time-code"
        class="auth-input"
      />
      <p class="field-error" *ngIf="form.get('token')?.invalid && form.get('token')?.touched">
        Introduce el código recibido por email
      </p>

      <ion-button expand="block" type="submit" [disabled]="form.invalid || loading" class="auth-btn">
        <ion-spinner *ngIf="loading" name="crescent" />
        <span *ngIf="!loading">Confirmar</span>
      </ion-button>

    </form>

    <ion-button fill="clear" expand="block" routerLink="/register" class="auth-link">
      ← Volver al registro
    </ion-button>

  </div>
</ion-content>
